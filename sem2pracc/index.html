<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum of N Numbers</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Sum of N Numbers</h1>
        <div class="form-group">
            <label for="n">Enter N (how many numbers):</label>
            <input type="number" id="n" min="1" placeholder="Enter N">
            <button onclick="createInputs()">Create Fields</button>
        </div>
        
        <div id="numbersContainer"></div>
        
        <button onclick="calculateSum()" class="submit-btn">Calculate Sum</button>
        
        <div id="result"></div>
    </div>
    <script src="main.jsx"></script>
</body>
</html>
